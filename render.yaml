services:
  - type: web
    name: agente-vendas
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CLIENTES_TABLE
        value: clientes
      - key: CONVERSAS_TABLE
        value: conversas
      - key: MERCOS_BASE_URL
        value: https://sandbox.mercos.com/api
      - key: MERCOS_APPLICATION_TOKEN
        sync: false
      - key: MERCOS_COMPANY_TOKEN
        sync: false
      - key: PRODUTOS_FONTE
        value: supabase
      - key: PULSEDESK_BRIDGE_ENABLED
        value: "true"
      - key: PULSEDESK_PEDIDOS_ENABLED
        value: "true"
      - key: MERCOS_CRIAR_PEDIDO
        value: "true"
      - key: WHATSAPP_PROVIDER
        value: zapi
      - key: ZAPI_INSTANCE_ID
        sync: false
      - key: ZAPI_TOKEN
        sync: false
      - key: ZAPI_CLIENT_TOKEN
        sync: false
      - key: ULTRAMSG_INSTANCE_ID
        sync: false
      - key: ULTRAMSG_TOKEN
        sync: false
      - key: VENDEDOR_WHATSAPP
        sync: false
