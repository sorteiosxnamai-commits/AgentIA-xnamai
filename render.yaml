services:
  - type: web
    name: agente-vendas
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_ASSISTANT_ID
        sync: false
      - key: OPENAI_USE_ASSISTANT
        value: "false"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: MERCOS_BASE_URL
        value: https://sandbox.mercos.com/api
      - key: MERCOS_APPLICATION_TOKEN
        sync: false
      - key: MERCOS_COMPANY_TOKEN
        sync: false
      - key: PRODUTOS_FONTE
        value: auto
      - key: ULTRAMSG_INSTANCE_ID
        sync: false
      - key: ULTRAMSG_TOKEN
        sync: false
      - key: VENDEDOR_WHATSAPP
        sync: false
